kind = "web"
previewPath = "/"
title = "InfluenceBridge"
version = "1.0.0"
id = "artifacts/influencer-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22989

[services.development]
run = "pnpm --filter @workspace/influencer-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/influencer-hub", "run", "build" ]
publicDir = "artifacts/influencer-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22989"
BASE_PATH = "/"
